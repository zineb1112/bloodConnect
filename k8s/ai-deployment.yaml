apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-deployment
  namespace: bloodconnect

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-service

  template:
    metadata:
      labels:
        app: ai-service

    spec:
      containers:
        - name: ai-container
          image: rihab10/ai-service:v1

          ports:
            - containerPort: 50051

          env:
            - name: DB_HOST
              value: db

            - name: DB_NAME
              value: blood_db

            - name: DB_USER
              value: blood_user

            - name: DB_PASSWORD
              value: blood_pass
