apiVersion: apps/v1
kind: Deployment

metadata:
  name: hospital-deployment
  namespace: bloodconnect

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hospital-backend

  template:
    metadata:
      labels:
        app: hospital-backend

    spec:
      containers:
        - name: hospital-container
          image: rihab10/hospital-backend:v3
          imagePullPolicy: Always

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          ports:
            - containerPort: 8000

          env:
            - name: DB_HOST
              value: db

            - name: DB_PORT
              value: "5432"

            - name: DB_NAME
              value: blood_db

            - name: DB_USER
              value: blood_user

            - name: DB_PASSWORD
              value: blood_pass

          livenessProbe:
            httpGet:
              path: /
              port: 8000

            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 8000
