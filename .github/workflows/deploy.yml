name: CI-CD BloodConnect

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Hospital Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hospital-backend:latest ./hospital

      - name: Push Hospital Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hospital-backend:latest

      - name: Build Donor Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/donor-backend:latest ./donor

      - name: Push Donor Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/donor-backend:latest

      - name: Build AI Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-service:latest ./ai

      - name: Push AI Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-service:latest
