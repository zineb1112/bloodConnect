name: CI-CD DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-scan:
    name: Security Scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      #  Secret scanning
      - name: Gitleaks Scan (Secrets)
        uses: gitleaks/gitleaks-action@v2

      #  Python dependency security scan
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install safety & bandit
        run: |
          pip install safety bandit pip-audit

      - name: Dependency vulnerability scan
        run: pip-audit

      - name: Static code security scan (Bandit)
        run: bandit -r hospital_backend donor_backend ai_service

  build-and-scan:
    name: Build & Docker Security Scan
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build images
      - name: Build Hospital image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/hospital-backend:v3 ./hospital_backend

      - name: Build Donor image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/donor-backend:v3 ./donor_backend

      - name: Build AI image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-service:v3 ./ai_service

      #  Docker image vulnerability scan (Trivy)
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.48.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.48.0_Linux-64bit.deb

      - name: Scan Hospital image
        run: trivy image ${{ secrets.DOCKER_USERNAME }}/hospital-backend:v3

      - name: Scan Donor image
        run: trivy image ${{ secrets.DOCKER_USERNAME }}/donor-backend:v3

      - name: Scan AI image
        run: trivy image ${{ secrets.DOCKER_USERNAME }}/ai-service:v3

      #  Push images
      - name: Push Hospital image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/hospital-backend:v3

      - name: Push Donor image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/donor-backend:v3

      - name: Push AI image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-service:v3

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to cluster
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment hospital-deployment -n bloodconnect
          kubectl rollout restart deployment donor-deployment -n bloodconnect
          kubectl rollout restart deployment ai-deployment -n bloodconnect
