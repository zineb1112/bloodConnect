name: CI-CD DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:

# =========================
# SECURITY SCANS
# =========================
  security-scan:
    name: Security Scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install security tools
        run: |
          pip install pip-audit bandit safety

      - name: Dependency scan (pip-audit)
        run: pip-audit || true

      - name: Static code scan (Bandit)
        run: bandit -r hospital_backend donor_backend ai_service || true


# =========================
# BUILD + SCAN + PUSH
# =========================
  build-and-scan:
    name: Build & Docker Security Scan
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Hospital image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/hospital-backend:v3 ./hospital_backend

      - name: Build Donor image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/donor-backend:v3 ./donor_backend

      - name: Build AI image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-service:v3 ./ai_service

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -
          sudo mv ./bin/trivy /usr/local/bin/trivy

      - name: Scan Hospital image
        run: trivy image --severity HIGH,CRITICAL --exit-code 0 ${{ secrets.DOCKER_USERNAME }}/hospital-backend:v3

      - name: Scan Donor image
        run: trivy image --severity HIGH,CRITICAL --exit-code 0 ${{ secrets.DOCKER_USERNAME }}/donor-backend:v3

      - name: Scan AI image
        run: trivy image --severity HIGH,CRITICAL --exit-code 0 ${{ secrets.DOCKER_USERNAME }}/ai-service:v3

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hospital-backend:v3
          docker push ${{ secrets.DOCKER_USERNAME }}/donor-backend:v3
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-service:v3


# =========================
# DEPLOY TO KUBERNETES (GKE)
# =========================
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # AUTH GCP
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # INSTALL GCloud SDK
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # INSTALL GKE AUTH PLUGIN
      - name: Install GKE auth plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin

      # SETUP KUBECTL
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # GET CLUSTER CREDENTIALS
      - name: Authenticate to GKE
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: bloodconnect-cluster
          location: us-central1-a
          project_id: bloodconnect-496511

      # VERIFY CLUSTER
      - name: Check cluster
        run: kubectl get nodes

      # DEPLOY
      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      # VERIFY ROLLOUT
      - name: Verify rollout
        run: |
          kubectl rollout status deployment hospital-deployment -n bloodconnect
          kubectl rollout status deployment donor-deployment -n bloodconnect
          kubectl rollout status deployment ai-deployment -n bloodconnect