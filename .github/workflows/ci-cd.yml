name: BloodConnect DevSecOps Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installer Docker
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      # 3. Build de tous les services
      - name: Build all services
        run: docker compose build

      # 4. Lancer stack complète
      - name: Start full stack
        run: docker compose up -d

      # 5. Vérifier containers
      - name: Check running containers
        run: docker ps

      # 6. Logs (debug utile pour jury)
      - name: Show logs (hospital)
        run: docker logs hospital_service

      - name: Show logs (donor)
        run: docker logs donor_service


  security-scan:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
