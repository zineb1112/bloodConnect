name: BloodConnect DevSecOps Pipeline

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: docker.io
  IMAGE_TAG: latest

jobs:

# =========================================
# BUILD + PUSH IMAGES
# =========================================
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # BUILD + PUSH HOSPITAL
      - name: Build & Push Hospital
        run: |
          docker build -t $REGISTRY/${{ secrets.DOCKERHUB_USERNAME }}/hospital_service:$IMAGE_TAG hospital_backend
          docker push $REGISTRY/${{ secrets.DOCKERHUB_USERNAME }}/hospital_service:$IMAGE_TAG

      # BUILD + PUSH DONOR
      - name: Build & Push Donor
        run: |
          docker build -t $REGISTRY/${{ secrets.DOCKERHUB_USERNAME }}/donor_service:$IMAGE_TAG donor_backend
          docker push $REGISTRY/${{ secrets.DOCKERHUB_USERNAME }}/donor_service:$IMAGE_TAG

      # BUILD + PUSH AI
      - name: Build & Push AI
        run: |
          docker build -t $REGISTRY/${{ secrets.DOCKERHUB_USERNAME }}/ai_service:$IMAGE_TAG ai_service
          docker push $REGISTRY/${{ secrets.DOCKERHUB_USERNAME }}/ai_service:$IMAGE_TAG

# =========================================
# SECURITY SCAN (OPTIONNEL)
# =========================================
  security-scan:
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Scan images
        run: |
          trivy image ${{ secrets.DOCKERHUB_USERNAME }}/hospital_service:latest || true
          trivy image ${{ secrets.DOCKERHUB_USERNAME }}/donor_service:latest || true
          trivy image ${{ secrets.DOCKERHUB_USERNAME }}/ai_service:latest || true

# =========================================
# DEPLOY TO KUBERNETES
# =========================================
  deploy-k8s:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/
