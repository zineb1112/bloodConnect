name: BloodConnect DevSecOps Pipeline

on:
  push:
    branches: ["main"]

# Required permissions for CodeQL
permissions:
  actions: read
  contents: read
  security-events: write

jobs:

  # =========================================
  # BUILD & TEST
  # =========================================
  build-test:
    runs-on: ubuntu-latest

    steps:

      # Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Docker
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      # Build Docker images
      - name: Build Docker images
        run: |
          docker compose build

          # Tag images for Trivy scanning
          docker tag bloodconnect-hospital hospital_service:latest || true
          docker tag bloodconnect-donor donor_service:latest || true
          docker tag bloodconnect-ai ai_service:latest || true

      # Start containers
      - name: Start full stack
        run: docker compose up -d

      # Verify running containers
      - name: Check running containers
        run: docker ps

      # Debug logs
      - name: Show logs (hospital)
        run: docker logs hospital_service || true

      - name: Show logs (donor)
        run: docker logs donor_service || true

      - name: Show logs (ai)
        run: docker logs ai_service || true


  # =========================================
  # SECURITY SCAN
  # =========================================
  security-scan:
    runs-on: ubuntu-latest
    needs: build-test

    steps:

      # Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # =====================================
      # Install Trivy
      # =====================================
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      # =====================================
      # Scan Docker Images
      # =====================================
      - name: Scan hospital image
        run: trivy image --severity HIGH,CRITICAL hospital_service:latest || true

      - name: Scan donor image
        run: trivy image --severity HIGH,CRITICAL donor_service:latest || true

      - name: Scan AI image
        run: trivy image --severity HIGH,CRITICAL ai_service:latest || true

      # =====================================
      # Static Code Analysis (SAST)
      # =====================================
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true

      # =====================================
      # Secrets Detection
      # =====================================
      - name: Scan secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2

      # =====================================
      # Python Dependency Security
      # =====================================
      - name: Install Safety
        run: pip install safety

      - name: Check Python dependencies
        run: safety check || true

      # =====================================
      # Dockerfile Security Linting
      # =====================================
      - name: Lint hospital Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: hospital_backend/Dockerfile

      - name: Lint donor Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: donor_backend/Dockerfile

      - name: Lint AI Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ai_service/Dockerfile

      # =====================================
      # Validate Docker Compose
      # =====================================
      - name: Validate docker-compose
        run: docker compose config
