name: BloodConnect DevSecOps Pipeline

on:
  push:
    branches: ["main"]

# Permissions required for CodeQL
permissions:
  actions: read
  contents: read
  security-events: write

jobs:

  # =========================================
  # BUILD & TEST
  # =========================================
  build-test:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Docker
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      # 3. Build Docker images
      - name: Build Docker images
        run: |
          docker compose build

          # Tag images for Trivy scanning
          docker tag bloodconnect-hospital hospital_service:latest || true
          docker tag bloodconnect-donor donor_service:latest || true

      # 4. Start stack
      - name: Start full stack
        run: docker compose up -d

      # 5. Verify containers
      - name: Check running containers
        run: docker ps

      # 6. Show logs for debugging
      - name: Show logs (hospital)
        run: docker logs hospital_service || true

      - name: Show logs (donor)
        run: docker logs donor_service || true


  # =========================================
  # SECURITY SCAN
  # =========================================
  security-scan:
    runs-on: ubuntu-latest
    needs: build-test

    steps:

      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # =====================================
      # Install Trivy
      # =====================================
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      # =====================================
      # Docker Image Vulnerability Scan
      # =====================================
      - name: Scan Docker images (Trivy)
        run: |
          trivy image --severity HIGH,CRITICAL hospital_service:latest || true
          trivy image --severity HIGH,CRITICAL donor_service:latest || true

      # =====================================
      # Static Code Analysis (SAST)
      # =====================================
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true

      # =====================================
      # Secrets Detection
      # =====================================
      - name: Scan secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2

      # =====================================
      # Python Dependencies Security
      # =====================================
      - name: Install Safety
        run: pip install safety

      - name: Check Python dependencies
        run: safety check || true

      # =====================================
      # Dockerfile Security Best Practices
      # =====================================
      - name: Dockerfile lint (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0

      # =====================================
      # Validate Docker Compose
      # =====================================
      - name: Validate docker-compose
        run: docker compose config
