name: BloodConnect DevSecOps Pipeline

on:
  push:
    branches: ["main"]

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Docker
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      # 3. Build images (IMPORTANT: avec tags explicites)
      - name: Build Docker images
        run: |
          docker compose build

          docker tag bloodconnect-hospital hospital_service:latest || true
          docker tag bloodconnect-donor donor_service:latest || true

      # 4. Start stack
      - name: Start full stack
        run: docker compose up -d

      # 5. Check containers
      - name: Check running containers
        run: docker ps

      # 6. Logs debug
      - name: Show logs (hospital)
        run: docker logs hospital_service || true

      - name: Show logs (donor)
        run: docker logs donor_service || true


  security-scan:
    runs-on: ubuntu-latest
    needs: build-test

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Install Trivy
      # -------------------------
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      # -------------------------
      # Docker image scan (FIXED)
      # -------------------------
      - name: Scan Docker images (Trivy)
        run: |
          trivy image --severity HIGH,CRITICAL hospital_service:latest || true
          trivy image --severity HIGH,CRITICAL donor_service:latest || true

      # -------------------------
      # Code Security (CodeQL)
      # -------------------------
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # -------------------------
      # Secrets detection
      # -------------------------
      - name: Scan secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2

      # -------------------------
      # Python dependencies check
      # -------------------------
      - name: Install safety
        run: pip install safety

      - name: Check Python dependencies
        run: safety check || true

      # -------------------------
      # Dockerfile lint
      # -------------------------
      - name: Dockerfile lint (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0

      # -------------------------
      # Validate docker compose
      # -------------------------
      - name: Validate docker-compose
        run: docker compose config
