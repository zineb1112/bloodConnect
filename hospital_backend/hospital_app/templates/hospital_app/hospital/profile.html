{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Profile</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'hospital_app/css/dashboard.css' %}?v=4">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column">
        <div class="logo">
            <img src="{% static 'hospital_app/images/bloodconnet.png' %}" alt="Hospital Logo">
        </div>

        <nav class="nav flex-column">
            <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
               href="{% url 'dashboard' %}">
                <i class="fas fa-home"></i> Dashboard
            </a>

            <a class="nav-link {% if request.resolver_match.url_name == 'post_request' %}active{% endif %}"
               href="{% url 'post_request' %}">
                <i class="fas fa-plus-circle"></i> Blood Requests
            </a>
            <a class="nav-link {% if request.resolver_match.url_name == 'forcast' %}active{% endif %}"
               href="{% url 'forcast' %}">
                <i class="fas fa-chart-line"></i> Forecast
            </a>

            <a class="nav-link {% if request.resolver_match.url_name == 'campaign' %}active{% endif %}"
               href="{% url 'campaign' %}">
                <i class="fas fa-bullhorn"></i> Campaigns
            </a>

            <a class="nav-link {% if request.resolver_match.url_name == 'donors' %}active{% endif %}"
               href="{% url 'donors' %}">
                <i class="fas fa-user-friends"></i> Donors
            </a>

            <a class="nav-link {% if request.resolver_match.url_name == 'profile' %}active{% endif %}"
               href="{% url 'profile' %}">
                <i class="fas fa-user"></i> Profile
            </a>
        </nav>

        <a href="{% url 'logout' %}" class="logout">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>

    <!-- Main Content -->
    <div class="main-content flex-grow-1 p-4">
        <div class="container-fluid">

            <h1 class="welcome-msg">Hospital Profile</h1>
            <p class="main-phrase">View and update your hospital information.</p>

            <!-- Profile Info Card -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Hospital Name</label>
                            <input
                                type="text"
                                class="form-control"
                                name="hospital_name"
                                value="{{ hospital.name|default_if_none:'' }}"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <input
                                type="text"
                                class="form-control"
                                name="address"
                                value="{{ hospital.address|default_if_none:'' }}"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Region</label>
                            <input
                                type="text"
                                class="form-control"
                                name="region"
                                value="{{ hospital.region|default_if_none:'' }}"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" placeholder="********">
                            <small class="text-muted">Leave blank if you don't want to change it</small>
                        </div>

                        <!-- Centered deep red update button -->
                        <div class="text-center mt-3">
                            <button type="submit" class="btn btn-custom">
                                <i class="fas fa-save"></i> Update Profile
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
