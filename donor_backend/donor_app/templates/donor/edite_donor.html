{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | BloodConnect</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SAME CSS -->
    <link rel="stylesheet" href="{% static 'donor/css/authentif.css' %}">
</head>
<body>

<div class="login-page d-flex justify-content-center align-items-start">
    <div class="login-card signup-card p-4 shadow">

        <!-- Logo -->
        <div class="text-center mb-4">
            <img src="{% static 'donor/images/bloodconnet.png' %}" alt="Logo" class="logo">
        </div>

        <!-- Title -->
        <h5 class="text-center text-signin mb-4">Edit Donor Profile</h5>

        <!-- Edit Form -->
        <form method="POST" action="{% url 'edit_donor' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control"
                       name="full_name"
                       value="{{ donor.full_name }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-control"
                       name="phone_number"
                       value="{{ donor.phone_number }}">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Gender</label>
                    <select class="form-select" name="gender">
                        <option value="Male" {% if donor.gender == "Male" %}selected{% endif %}>Male</option>
                        <option value="Female" {% if donor.gender == "Female" %}selected{% endif %}>Female</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Blood Type</label>
                    <input type="text" class="form-control"
                           name="blood_type"
                           value="{{ donor.blood_type }}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Region</label>
                <input type="text" class="form-control"
                       name="region"
                       value="{{ donor.region }}">
            </div>

            <div class="mb-3">
                <label class="form-label">City</label>
                <input type="text" class="form-control"
                       name="city"
                       value="{{ donor.city }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Weight (kg)</label>
                <input type="number" class="form-control"
                       name="weight"
                       value="{{ donor.weight }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Last Donation Date</label>
                <input type="date" class="form-control"
                       name="last_donation_date"
                       value="{{ donor.last_donation_date|date:'Y-m-d' }}">
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input"
                       type="checkbox"
                       id="availability"
                       name="availability"
                       {% if donor.availability %}checked{% endif %}>
                <label class="form-check-label" for="availability">
                    Available for Donation
                </label>
            </div>

            <button type="submit" class="btn btn-login w-100">
                Update Profile
            </button>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
