{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | BloodConnect</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SAME CSS AS LOGIN -->
    <link rel="stylesheet" href="{% static 'donor/css/authentif.css' %}">

</head>
<body>

<div class="login-page d-flex justify-content-center align-items-start">
    <div class="login-card signup-card p-4 shadow">

        <!-- Logo -->
        <div class="text-center mb-4">
            <img src="{% static 'donor/images/bloodconnet.png' %}" alt="Logo" class="logo">
        </div>

        <!-- Title -->
        <h5 class="text-center text-signin mb-4">Create Donor Account</h5>

        <!-- Messages -->
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="alert alert-success">{{ success }}</div>
        {% endif %}

        <!-- Signup Form -->
        <form method="POST" action="{% url 'donor-register' %}" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" name="full_name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" name="username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Birth Date</label>
                    <input type="date" class="form-control" name="birth_date">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text" class="form-control" name="phone_number">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Gender</label>
                    <select class="form-select" name="gender">
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Blood Type</label>
                    <select class="form-select" name="blood_type" required>
                        <option value="">Select blood type</option>
                        <option value="A+">A+</option>
                        <option value="A-">A−</option>
                        <option value="B+">B+</option>
                        <option value="B-">B−</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB−</option>
                        <option value="O+">O+</option>
                        <option value="O-">O−</option>
                    </select>
                </div>

            </div>

            <div class="mb-3">
                <label class="form-label">Region</label>
                <input type="text" class="form-control" name="region">
            </div>

            <div class="mb-3">
                <label class="form-label">City</label>
                <input type="text" class="form-control" name="city">
            </div>

            <div class="mb-3">
                <label class="form-label">Weight (kg)</label>
                <input type="number" class="form-control" name="weight">
            </div>

            <div class="mb-3">
                <label class="form-label">Profile Image</label>
                <input type="file" class="form-control" name="image_url">
            </div>

            <div class="form-check mb-3">
                <input
                    type="checkbox"
                    class="form-check-input"
                    id="availability"
                    name="availability"
                    value="on"
                    checked
                >
                <label class="form-check-label" for="availability">
                    Available for Donation
                </label>
            </div>

            <div class="mb-3">
                <label class="form-label">Last Donation Date</label>
                <input type="date" class="form-control" name="last_donation_date">
            </div>

            <button type="submit" class="btn btn-login w-100">Register</button>
        </form>

        <div class="text-center mt-3">
            Already have an account?
            <a href="{% url 'loginView' %}" class="signup">Login</a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
