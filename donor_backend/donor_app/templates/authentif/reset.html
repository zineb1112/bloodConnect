{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | BloodConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'donor/css/authentif.css' %}">
</head>
<body>

<div class="login-page d-flex justify-content-center align-items-center vh-100">
    <div class="reset-card p-4 shadow">
        <!-- Logo -->
        <div class="text-center mb-3">
            <img src="{% static 'donor/images/bloodconnet.png' %}" class="logo" alt="BloodConnect">
        </div>

        <!-- Reset Password Text -->
        <h5 class="text-center text-signin mb-4">Reset your password</h5>

        <!-- Reset Password Form -->
        <form method="POST" action="">
            {% csrf_token %}
            <input type="hidden" name="user_type" id="user_type" value="donor">

            <div class="mb-3">
                <label for="email" class="form-label">Email / Username</label>
                <input type="email" name="email" class="form-control" id="email" placeholder="Enter your email" required>
            </div>

            <button type="submit" class="btn btn-login w-100 mb-3">Send Reset Link</button>
        </form>
    </div>
</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function switchUser(type){
    document.getElementById('user_type').value = type;

    document.getElementById('donor-btn').classList.remove('active');
    document.getElementById('hospital-btn').classList.remove('active');

    if(type==='donor'){
        document.getElementById('donor-btn').classList.add('active');
    } else {
        document.getElementById('hospital-btn').classList.add('active');
    }
}
</script>

</body>
</html>
