{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BloodConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'donor/css/authentif.css' %}">
</head>
<body>

<div class="login-page d-flex justify-content-center align-items-center vh-100">
    <div class="login-card p-4 shadow">
        <!-- Logo -->
        <div class="text-center mb-3">
            <img src="{% static 'donor/images/bloodconnet.png' %}" class="logo" alt="BloodConnect">
        </div>

        <!-- Sign in text -->
        <h5 class="text-center text-signin mb-4">Sign in to your account</h5>

        <!-- User Type Buttons -->
        <div class="d-flex justify-content-center mb-4 gap-2">
            <!-- Donor -->
              <div class="user-btn active" id="donor-btn" onclick="switchUser('donor')">
              <i class="far fa-user me-2"></i>
               Donor
              </div>

            <!-- Hospital 
              <div class="user-btn" id="hospital-btn" onclick="switchUser('hospital')">
              <i class="far fa-hospital me-2"></i>
              Hospital
              </div> -->

        </div>

        <!-- Login Form -->
        <form method="POST" action="{% url 'donor-login' %}">
            {% csrf_token %}
            <input type="hidden" name="user_type" id="user_type" value="donor">

            {% if error %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <strong>Error:</strong> {{ error }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endif %}

            {% if success %}
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    <strong>Success:</strong> {{ success }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endif %}

            <div class="mb-3">
                <label for="email" class="form-label">Email / Username</label>
                <input type="email" name="email" class="form-control" id="email" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" class="form-control" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-login w-100 mb-3">Login</button>
        </form>

        <div class="text-center mb-2">
            <a href="{% url 'newpasswordView' %}" class="forgot-password">Forgot password?</a>
        </div>
        <div class="text-center">
            <span>Don't have an account? </span>
            <a href="{% url 'registerView' %}" class="signup">Sign up</a>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function switchUser(type){
    document.getElementById('user_type').value = type;

    document.getElementById('donor-btn').classList.remove('active');
    document.getElementById('hospital-btn').classList.remove('active');

    if(type==='donor'){
        document.getElementById('donor-btn').classList.add('active');
    } else {
        document.getElementById('hospital-btn').classList.add('active');
    }
}
</script>

</body>
</html>
